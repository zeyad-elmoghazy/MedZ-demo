## MedZ nginx front — replace DOMAIN_NAME before dropping into
## /etc/nginx/sites-available/ and symlinking into sites-enabled/.

limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

server {
  listen 80;
  server_name DOMAIN_NAME www.DOMAIN_NAME;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name DOMAIN_NAME www.DOMAIN_NAME;

  ssl_certificate     /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  # 1y immutable cache on hashed static bundles.
  location /_next/static/ {
    alias /var/www/medz/.next/static/;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # Tight limit on auth (login/signup); catches credential stuffing at the edge.
  location /api/auth/ {
    limit_req zone=auth burst=5 nodelay;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        'upgrade';
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Edge-level defense in depth — Next also sets these, but nginx wins
  # for any response that bypasses the Node process (static, errors).
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Frame-Options           "DENY"    always;
  add_header X-Content-Type-Options    "nosniff" always;

  access_log /var/log/nginx/medz-access.log;
  error_log  /var/log/nginx/medz-error.log warn;
}
